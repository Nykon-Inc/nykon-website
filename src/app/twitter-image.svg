<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0F172A"/>
  
  <!-- Technical Grid Background -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#22D3EE" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- Logo -->
  <g transform="translate(600, 315)">
    <!-- Central Square -->
    <rect x="-60" y="-60" width="120" height="120" fill="#22D3EE" />
    <text x="0" y="25" text-anchor="middle" fill="#0F172A" font-family="Satoshi, sans-serif" font-weight="900" font-size="80">N</text>
    
    <!-- Outer Technical Lines -->
    <rect x="-80" y="-80" width="160" height="160" stroke="#22D3EE" stroke-width="2" stroke-opacity="0.3" fill="none" />
    <rect x="-100" y="-100" width="200" height="200" stroke="#22D3EE" stroke-width="1" stroke-opacity="0.1" fill="none" />
    
    <!-- Expanding Circles -->
    <circle r="150" stroke="#22D3EE" stroke-width="1" stroke-opacity="0.05" fill="none" />
    <circle r="200" stroke="#22D3EE" stroke-width="1" stroke-opacity="0.02" fill="none" />
  </g>

  <!-- Text -->
  <text x="600" y="500" text-anchor="middle" fill="#F8FAFC" font-family="Satoshi, sans-serif" font-weight="900" font-size="60" letter-spacing="0.2em">NYKON</text>
  <text x="600" y="550" text-anchor="middle" fill="#22D3EE" font-family="Satoshi, sans-serif" font-weight="700" font-size="20" letter-spacing="0.1em" opacity="0.6">INTELLIGENT OPERATIONAL SYSTEMS</text>

  <!-- Technical Accents -->
  <path d="M 100 100 L 200 100 M 100 100 L 100 200" stroke="#22D3EE" stroke-width="2" opacity="0.3" />
  <path d="M 1100 100 L 1000 100 M 1100 100 L 1100 200" stroke="#22D3EE" stroke-width="2" opacity="0.3" />
  <path d="M 100 530 L 200 530 M 100 530 L 100 430" stroke="#22D3EE" stroke-width="2" opacity="0.3" />
  <path d="M 1100 530 L 1000 530 M 1100 530 L 1100 430" stroke="#22D3EE" stroke-width="2" opacity="0.3" />
</svg>
